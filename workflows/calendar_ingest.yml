name: 📅 HYEOKS 증시 캘린더 자동 수집기

on:
  schedule:
    - cron: '0 22 * * *'   # 매일 07:00 KST (22:00 UTC 전날) — 장 시작 전에 새 PDF 있는지 확인
  workflow_dispatch:        # 새 캘린더 PDF 올리신 직후 수동으로 바로 돌리고 싶을 때

concurrency:
  group: hyeoks-sheet-lock  # 💡 다른 시트 쓰기 작업과 동일한 락 그룹 — 동시 충돌 방지
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 코드 가져오기
      uses: actions/checkout@v4

    - name: 🐍 파이썬 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install gspread oauth2client google-genai google-api-python-client pdfplumber

    - name: 🚀 구글 시트 보안 인증 파일(secret.json) 생성
      env:
        SECRET_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
      run: |
        echo "$SECRET_JSON" > secret.json

    - name: 📅 캘린더 PDF 확인 및 주요일정 반영
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python hyeoks_calendar_ingest.py
