name: 🌅 HYEOKS 모닝 브리핑

on:
  workflow_dispatch:
  schedule:
    - cron: '55 22 * * 0-4'

concurrency:
  group: hyeoks-google-sheet
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 코드 가져오기
      uses: actions/checkout@v4

    - name: 🐍 파이썬 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 google-genai>=0.1.2 gspread oauth2client

    # 💡 [핵심] secret.json 파일 만드는 단계를 아예 삭제해버렸습니다!

    - name: 🌅 모닝 브리핑 생성 및 텔레그램 발송
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # 💡 [핵심] 파이썬이 직접 읽어갈 수 있도록 환경변수로 바로 쏴줍니다.
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
      run: |
        python hyeoks_morning.py
