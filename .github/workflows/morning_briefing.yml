name: 🌅 HYEOKS 모닝 브리핑

on:
  workflow_dispatch:
  schedule:
    # 한국 시간 아침 7시 55분 (UTC 22:55)
    - cron: '55 22 * * 0-4'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        # 에러의 원인이었던 cache 옵션 삭제 완료!
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pandas gspread oauth2client kiwipiepy
        
    - name: Create secret.json
      env:
        GCP_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }} 
      run: echo "$GCP_CREDENTIALS" > secret.json
        
    - name: Run Main Engine
      run: python hyeoks_morning.py
