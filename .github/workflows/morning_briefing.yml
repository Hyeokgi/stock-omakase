name: 🌅 HYEOKS 모닝 브리핑

on:
  workflow_dispatch:
  schedule:
    # 한국 시간 아침 7시 55분 (UTC 22:55)
    - cron: '55 22 * * 0-4'

concurrency:
  group: hyeoks-google-sheet
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 코드 가져오기
      uses: actions/checkout@v4

    - name: 🐍 파이썬 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 google-genai>=0.1.2 gspread oauth2client

    - name: 🚀 구글 시트 보안 인증 파일(secret.json) 만들기
      env:
        # 💡 [정답] 깃허브 금고의 '진짜 이름'을 정확히 호출!
        GCP_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }} 
      run: echo "$GCP_CREDENTIALS" > secret.json
      
    - name: 🌅 모닝 브리핑 생성 및 텔레그램 발송
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python hyeoks_morning.py
