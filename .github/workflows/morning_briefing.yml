name: 🌅 HYEOKS 모닝 브리핑

on:
  workflow_dispatch:

# 쓰기 시트가 '브리핑_기록' 뿐이라 omakase와 무충돌 → 전용 그룹으로 분리해 10분 스캐너에 밀려 취소되던 기아 해소
concurrency:
  group: hyeoks-morning-lock
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: 📥 코드 가져오기
      uses: actions/checkout@v4

    - name: 🐍 파이썬 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 google-genai>=0.1.2 gspread oauth2client

    - name: 🌅 모닝 브리핑 생성 및 텔레그램 발송
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
        KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      run: |
        python hyeoks_morning.py
