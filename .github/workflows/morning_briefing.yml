name: 🌅 HYEOKS 모닝 브리핑

on:
  workflow_dispatch:
  # 💡 [핵심] 어제 날아간 알람시계를 다시 장착합니다! (한국시간 오전 7시 55분)
  schedule:
    - cron: '55 22 * * 0-4'

concurrency:
  group: hyeoks-google-sheet
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 코드 가져오기
      uses: actions/checkout@v4

    - name: 🐍 파이썬 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 google-genai>=0.1.2 gspread oauth2client

    - name: 🌅 모닝 브리핑 생성 및 텔레그램 발송
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # 💡 [핵심] 파일(secret.json)을 만들지 않고 환경변수로 직접 주입!
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
      run: |
        python hyeoks_morning.py
