name: Stock Omakase Auto Scraper

on:
  schedule:
    # 한국시간(KST) 오전 9시 ~ 오후 4시 50분까지 (월~금 평일에만 10분마다 실행)
    # UTC 기준으로는 0시 ~ 7시입니다.
    - cron: '*/10 0-7 * * 1-5'
  workflow_dispatch: # 내가 버튼 눌러서 강제 실행하는 기능

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: 파이썬 설치하기
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 라이브러리 설치하기
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas gspread oauth2client

      - name: 비밀번호 파일(secret.json) 만들기
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > secret.json

      - name: 파이썬 실행!
        run: python omakase.py
