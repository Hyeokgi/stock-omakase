name: Stock Omakase Auto Scraper

on:
  schedule:
    # 한국시간 평일(월~금) 오전 9시 ~ 오후 3시 59분까지만 15분 간격으로 알뜰하게 실행!
    - cron: '*/15 0-6 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설치하기
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 라이브러리 설치하기
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas gspread oauth2client kiwipiepy

      - name: 비밀번호 파일(secret.json) 만들기
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > secret.json

      - name: 파이썬 실행!
        run: python omakase.py
