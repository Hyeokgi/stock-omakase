name: Stock Omakase Auto Scraper

on:
  workflow_dispatch: # 수동 버튼 (테스트용)
  schedule:
    - cron: '*/10 * * * 1-5' # 💡 [복구 완료] 깃허브의 알람 부활! (월~금 10분마다 무한 가동)

# 💡 [핵심 패치] 구글 시트 충돌 방지 대기열 (ai_report.yml과 동일한 그룹명)
concurrency:
  group: hyeoks-google-sheet
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설치하기
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 라이브러리 설치하기
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas gspread oauth2client kiwipiepy

      - name: 비밀번호 파일(secret.json) 만들기
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }} 
        run: echo "$GCP_CREDENTIALS" > secret.json

      - name: 파이썬 실행!
        run: python omakase.py
