name: 🚀 HYEOKS 통합 자동 실행 (Scanner + AI Report)

on:
  schedule:
    # KST 15:00 (UTC 06:00)
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
    # 1️⃣ 코드 가져오기
    - name: 📥 코드 가져오기
      uses: actions/checkout@v4

    # 2️⃣ 파이썬 세팅
    - name: 🐍 파이썬 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3️⃣ 라이브러리 설치
    - name: 📦 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pandas gspread oauth2client kiwipiepy google-generativeai pdfkit markdown Pillow

    # 4️⃣ PDF + 폰트
    - name: 🛠️ PDF 및 폰트 설치
      run: |
        sudo apt-get update
        sudo apt-get install -y wkhtmltopdf fonts-nanum
        fc-cache -fv

    # 5️⃣ Google Sheets 인증
    - name: 🔐 secret.json 생성
      env:
        GOOGLE_SHEETS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
      run: echo "$GOOGLE_SHEETS" > secret.json

    # 6️⃣ 🔥 스캐너 실행
    - name: 🎯 종가 스캐너 실행
      run: python omakase.py

    # 7️⃣ ⏳ 데이터 반영 대기 (중요)
    - name: 데이터 반영 대기
      run: sleep 60

    # 8️⃣ 🔥 AI 리포트 실행 (재시도 포함)
    - name: 🤖 AI 리포트 생성 및 텔레그램 발송
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        for i in 1 2 3; do
          python hyeoks_analyst.py && break
          echo "⚠️ 실패 → 30초 후 재시도 ($i)"
          sleep 30
        done
