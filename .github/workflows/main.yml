name: Stock Omakase Auto Scraper

on:
  schedule:
    # 🌅 [아침 출근조] KST 월~금 오전 7시 ~ 8시 55분 (UTC 일~목 22시~23시)
    - cron: '5,15,25,35,45,55 22-23 * * 0-4'
    
    # ☀️ [주간/야간조] KST 월~금 오전 9시 ~ 오후 7시 55분 (UTC 월~금 0시~10시)
    - cron: '5,15,25,35,45,55 0-10 * * 1-5'
    
  workflow_dispatch:
# 킥스타트
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설치하기
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 라이브러리 설치하기
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas gspread oauth2client kiwipiepy

      - name: 비밀번호 파일(secret.json) 만들기
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }} 
        run: echo "$GCP_CREDENTIALS" > secret.json

      - name: 파이썬 실행!
        run: python omakase.py
