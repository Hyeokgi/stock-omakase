name: Stock Omakase Auto Scraper

on:
  schedule:
    # 💡 깃허브 시간표 버그 완벽 차단! 1년 365일 24시간 내내 10분마다 무조건 쏘기!
    # (밤이나 주말에는 파이썬이 알아서 차단하고 0.1초 만에 퇴근하므로 아주 안전합니다)
    - cron: '*/10 * * * *'
    
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설치하기
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 라이브러리 설치하기
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas gspread oauth2client kiwipiepy

      - name: 비밀번호 파일(secret.json) 만들기
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }} 
        run: echo "$GCP_CREDENTIALS" > secret.json

      - name: 파이썬 실행!
        run: python omakase.py
