name: Stock Omakase Auto Scraper

on:
  workflow_dispatch: # 수동 버튼
  schedule:
    # 💡 [월요일 아침 보장 패치] UTC 일요일(0) ~ 금요일(5) 설정
    # 한국 시간 기준: 일요일 09:00 ~ 토요일 08:50 (주중 전 구간 포함)
    - cron: '*/10 * * * 0-5'

concurrency:
  group: hyeoks-google-sheet
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설치하기
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 라이브러리 설치하기
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas gspread oauth2client kiwipiepy

      - name: 비밀번호 파일(secret.json) 만들기
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: echo "$GCP_CREDENTIALS" > secret.json

      - name: 파이썬 실행!
        env:
          # 💡 [핵심 패치] 파이썬이 실행될 때 깃허브 금고에서 열쇠를 꺼내어 쥐여줍니다!
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }} 
        run: python omakase.py
