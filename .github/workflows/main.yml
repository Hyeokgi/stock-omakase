name: Stock Omakase Auto Scraper

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4  # 👈 기존 v3를 v4로 수정했습니다!

      - name: 파이썬 설치하기
        uses: actions/setup-python@v5  # 👈 기존 v4를 v5로 수정했습니다!
        with:
          python-version: '3.10'

      - name: 라이브러리 설치하기
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas gspread oauth2client kiwipiepy

      - name: 비밀번호 파일(secret.json) 만들기
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > secret.json

      - name: 파이썬 실행!
        run: python omakase.py
