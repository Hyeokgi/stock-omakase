name: Stock Omakase Auto Scraper

on:
  workflow_dispatch: # 💡 구글(GAS) 원격 신호 수신 및 수동 실행 버튼
  
concurrency:
  group: hyeoks-omakase-scanner
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설치하기
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 라이브러리 설치하기
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas gspread oauth2client kiwipiepy

      - name: 비밀번호 파일(secret.json) 만들기
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: echo "$GCP_CREDENTIALS" > secret.json

      - name: 파이썬 실행!
        env:
          # 💡 [핵심 패치] 파이썬이 실행될 때 깃허브 금고에서 열쇠를 꺼내어 쥐여줍니다!
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }} 
        run: python omakase.py
