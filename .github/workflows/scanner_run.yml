name: 🎯 오후 3시 정각 종가베팅 스캐너

on:
  schedule:
    # 🎯 KST 15시 00분에 스캐너 먼저 가동!
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pandas gspread oauth2client kiwipiepy
        
    - name: Create secret.json
      env:
        # ai_report.yml과 동일한 환경 변수명으로 통일할 것을 권장합니다.
        GCP_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }} 
      run: echo "$GCP_CREDENTIALS" > secret.json
        
    - name: Run Main Engine
      run: python omakase.py
