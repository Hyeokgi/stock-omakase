name: 🎯 HYEOKS 스나이퍼 종베 봇

on:
  workflow_dispatch: # 구글 GAS에서 원격으로만 실행

# 💡 [필수 안전장치] 다른 리포트/스캐너와 겹치지 않게 대기열에 세웁니다.
concurrency:
  group: hyeoks-sheet-lock
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 코드 가져오기
      uses: actions/checkout@v4

    - name: 🐍 파이썬 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 google-genai>=0.1.2 gspread oauth2client

    - name: 🎯 스나이퍼 종베 픽 생성 및 기록
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
      run: |
        python scanner_bot.py
