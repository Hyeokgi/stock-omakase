name: 🎯 오후 3시 15분 종가베팅 스캐너

on:
  schedule:
    # 한국 시간(KST) 15시 15분은 협정세계시(UTC)로 06시 15분입니다. (월~금만 작동)
    - cron: '15 6 * * 1-5'
  workflow_dispatch: # 내가 버튼을 눌러서 수동으로 실행하고 싶을 때 쓰는 옵션

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests gspread oauth2client beautifulsoup4
        
    - name: Run Scanner Bot
      run: python scanner_bot.py
