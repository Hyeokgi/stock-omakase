name: 🎯 오후 3시 15분 종가베팅 스캐너

on:
  schedule:
    # 🎯 원래의 스나이퍼 시간표 복구! (KST 15시 05분)
    - cron: '05 6 * * 1-5'
    
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    # 💡 Node.js 경고를 없애는 최신 버전(v4, v5) 업그레이드!
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests gspread oauth2client beautifulsoup4
        
    - name: Create secret.json
      env:
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }} 
      run: echo "$GCP_CREDENTIALS" > secret.json
        
    - name: Run Scanner Bot
      run: python scanner_bot.py

