name: 🎯 오후 3시 15분 종가베팅 스캐너

on:
  schedule:
    # 🎯 하루 딱 한 번! KST 15시 05분에만 출동!
    - cron: '05 6 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pandas gspread oauth2client kiwipiepy
        
    - name: Create secret.json
      env:
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }} 
      run: echo "$GCP_CREDENTIALS" > secret.json
        
    # 💡 [핵심 변경] 구버전 scanner_bot.py 대신 완벽하게 통합된 omakase.py를 실행합니다.
    - name: Run Main Engine
      run: python omakase.py
