name: 🎯 오후 3시 15분 종가베팅 스캐너

on:
  schedule:
    - cron: '05 6 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    # 💡 Node.js 경고를 없애는 최신 버전(v4, v5) 업그레이드!
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests gspread oauth2client beautifulsoup4
        
    # 🚨🚨 [중요] 기존 yml 파일에서 secret.json을 만드는 코드를 확인하고 여기에 맞춰주세요!
    # (아래는 가장 일반적인 예시입니다. 회원님의 환경에 맞게 변수명(GCP_CREDENTIALS)을 확인해 주세요.)
    - name: Create secret.json
      env:
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }} 
      run: echo $GCP_CREDENTIALS > secret.json
        
    - name: Run Scanner Bot
      run: python scanner_bot.py
