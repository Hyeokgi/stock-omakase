name: 🎯 오후 3시 정각 종가베팅 스캐너

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        # 에러의 원인이었던 cache 옵션 삭제 완료!
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pandas gspread oauth2client kiwipiepy
        
    - name: Create secret.json
      env:
        GCP_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }} 
      run: echo "$GCP_CREDENTIALS" > secret.json
        
    - name: Run Main Engine
      run: python omakase.py

    # 💡 [신규 추가] 구글 시트가 넉넉히 저장될 때까지 5분 대기
    - name: ⏳ 데이터 동기화 대기 (5분)
      run: sleep 300

    # 💡 [신규 추가] 깃허브 내부에서 곧바로 ai_report.yml을 강제 호출!
    - name: 🎯 AI 리포트 발송 트리거 (ai_report.yml 호출)
      uses: peter-evans/repository-dispatch@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        event-type: trigger-ai-report
