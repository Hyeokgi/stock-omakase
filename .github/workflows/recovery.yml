name: 🚑 긴급 복구 스크립트 실행

on:
  workflow_dispatch: # 수동 실행 트리거(버튼) 활성화

jobs:
  run-recovery:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 코드 가져오기
        uses: actions/checkout@v4

      - name: 🐍 파이썬 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 필수 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests gspread oauth2client pandas beautifulsoup4

      - name: 🔑 Secret JSON 생성
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          echo "$GCP_CREDENTIALS" > secret.json

      - name: 🚑 복구 스크립트 실행
        run: |
          python recovery_raw.py
