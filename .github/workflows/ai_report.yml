name: 🤖 HYEOKS AI 리서치 퍼블리셔

on:
  schedule:
    - cron: '0 6 * * 1-5' # 한국시간(KST) 매주 월~금 오후 3시 00분
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 코드 가져오기
      uses: actions/checkout@v3

    - name: 🐍 파이썬 세팅 및 캐싱 적용 (속도 향상)
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip' # 💡 패키지 설치 기록을 저장하여 다음 실행부터 1초 컷으로 단축

    - name: 🛠️ PDF 렌더링 도구 및 나눔고딕 폰트 설치 (초고속 모드)
      run: |
        sudo apt-get install -y wkhtmltopdf fonts-nanum
        fc-cache -fv 

    - name: 📦 필수 라이브러리 설치
      run: |
        pip install requests gspread oauth2client google-generativeai pdfkit markdown Pillow

    - name: 🚀 구글 시트 보안 인증 파일(secret.json) 생성
      env:
        SECRET_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
      run: |
        echo "$SECRET_JSON" > secret.json

    - name: 📊 AI 리포트 생성 및 텔레그램 PDF 발송
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python hyeoks_analyst.py
