name: 🤖 HYEOKS AI 리서치 퍼블리셔

on:
  schedule:
    - cron: '3 6 * * 1-5' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 코드 가져오기
      uses: actions/checkout@v3

    - name: 🐍 파이썬 세팅
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 🛠️ PDF 렌더링 도구 및 나눔고딕 폰트 설치
      run: |
        sudo apt-get update
        sudo apt-get install -y wkhtmltopdf fonts-nanum
        fc-cache -fv 

    - name: 📦 필수 라이브러리 설치 (💡 Pillow 추가 완료!)
      run: |
        python -m pip install --upgrade pip
        pip install requests gspread oauth2client google-generativeai pdfkit markdown Pillow

    - name: 🚀 구글 시트 보안 인증 파일(secret.json) 생성
      env:
        SECRET_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
      run: |
        echo "$SECRET_JSON" > secret.json

    - name: 📊 AI 리포트 생성 및 텔레그램 PDF 발송
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python hyeoks_analyst.py
