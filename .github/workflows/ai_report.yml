name: 🤖 HYEOKS AI 리서치 퍼블리셔

on: 
  workflow_dispatch:
  # 💡 [핵심 패치] scanner_run.yml이 5분 대기 후 쏘는 신호를 받는 수신기 장착!
  repository_dispatch:
    types: [trigger-ai-report]

# 💡 [핵심 방패 장착] main.yml과 완벽하게 동일한 대기열 그룹 지정!
concurrency:
  group: hyeoks-google-sheet
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 코드 가져오기
      uses: actions/checkout@v4

    - name: 🐍 파이썬 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 🛠️ PDF 렌더링 도구 및 나눔고딕 폰트 설치
      run: |
        sudo apt-get update
        sudo apt-get install -y wkhtmltopdf fonts-nanum
        fc-cache -fv

    - name: 📦 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        # 💡 [핵심 수정] beautifulsoup4 모듈이 드디어 추가되었습니다!
        pip install requests gspread oauth2client google-genai>=0.1.2 pdfkit markdown Pillow beautifulsoup4

    - name: 🚀 구글 시트 보안 인증 파일(secret.json) 생성
      env:
        SECRET_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
      run: |
        echo "$SECRET_JSON" > secret.json

    - name: 📊 AI 리포트 생성 및 텔레그램 PDF 발송
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python hyeoks_analyst.py
