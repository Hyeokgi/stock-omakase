name: 🤖 HYEOKS AI 리서치 퍼블리셔

on: 
  workflow_dispatch: # 구글 GAS가 쏘는 신호만 받음 (시간 없음) + 사람이 Actions 탭에서 수동 실행 가능
    inputs:
      force_resend:
        description: '오늘 이미 발행됐어도 강제로 재발송할지 (중복 텔레그램 발송 주의 — 정말 필요할 때만 true)'
        required: false
        default: false
        type: boolean

concurrency:
  group: hyeoks-report-lock # 💡 [분리] omakase는 10분마다 재기동 → 같은 lock을 쓰면 대기열 1개 제한에 밀려 리포트가 취소됨. 백테스트 기록이 셀 타겟 업데이트 방식으로 바뀌어 더 이상 lock 통합이 필요 없음.
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 코드 가져오기
      uses: actions/checkout@v4

    - name: 🐍 파이썬 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 🛠️ PDF 렌더링 도구 및 나눔고딕 폰트 설치
      run: |
        sudo apt-get update
        sudo apt-get install -y wkhtmltopdf fonts-nanum
        fc-cache -fv

    - name: 📦 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests gspread oauth2client google-genai pdfkit markdown Pillow beautifulsoup4 pandas
                
    - name: 🚀 구글 시트 보안 인증 파일(secret.json) 생성
      env:
        SECRET_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
      run: |
        echo "$SECRET_JSON" > secret.json

    - name: 📊 AI 리포트 생성 및 텔레그램 PDF 발송
      env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 👇 반드시 이 두 줄이 리포트 실행 단계에도 있어야 합니다!
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          # 🛡️ [예외 재실행] 기본값 false — 사람이 Actions 탭에서 수동 실행할 때만 체크박스로 켤 수 있음
          FORCE_RESEND: ${{ inputs.force_resend }}
      run: |
        python hyeoks_analyst.py
