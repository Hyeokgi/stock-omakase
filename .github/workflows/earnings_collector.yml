name: 📊 HYEOKS 실적(매출액/영업이익) 수집기

on:
  schedule:
    - cron: '0 11 * * *'   # 매일 20:00 KST (11:00 UTC) — 새벽 시간대(04:00)에 DART 접속이 계속 실패해서 저녁으로 이동해봄
  workflow_dispatch:        # 수동으로 바로 돌려서 테스트하고 싶을 때

concurrency:
  group: hyeoks-earnings-lock  # 🔧 [수정] omakase.py와 같은 락(hyeoks-sheet-lock)을 썼다가, 이 스크립트가
  #    DART API 불통으로 몇 시간씩 안 끝나면 스캐너 트리거들이 대기열에 밀려 취소되는 연쇄를 겪었음
  #    (2026-07 사고). 실제로 겹치는 시트가 없어서(DB_실적·DB_기업코드매핑만 건드림) 같은 락을 쓸 이유가
  #    없었음 — 전용 락으로 분리해서 서로 절대 안 막도록 함.
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # 💡 [하드 백스톱] 회로차단기가 어떤 이유로든 안 걸리면 깃허브가 강제 종료 (2026-07 DART 불통 4시간34분 사고 재발 방지)

    steps:
    - name: 📥 코드 가져오기
      uses: actions/checkout@v4

    - name: 🐍 파이썬 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install gspread oauth2client requests

    - name: 🚀 구글 시트 보안 인증 파일(secret.json) 생성
      env:
        SECRET_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
      run: |
        echo "$SECRET_JSON" > secret.json

    - name: 📊 실적(매출액/영업이익) 수집 및 DB_실적 반영
      env:
        DART_API_KEY: ${{ secrets.DART_API_KEY }}
      run: |
        python hyeoks_earnings_collector.py
