name: Test Afterhours API

on:
  workflow_dispatch: # 수동 실행을 위한 설정

jobs:
  test_api:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v3

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 필요 라이브러리 설치 (requests)
        run: pip install requests

      - name: 🚀 진단 스크립트 실행
        run: python test_afterhours.py
